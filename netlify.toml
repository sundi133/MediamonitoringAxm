[build]
  # Build command
  command = "npm run build"
  
  # Output directory (Vite outputs to 'build' per your vite.config.ts)
  publish = "build"
  
  # Ignore supabase temp files from deployment
  ignore = "supabase/.temp/*"

[build.environment]
  # Node version
  NODE_VERSION = "20"
  
  # Skip secrets scanning for public Supabase keys (they're meant to be client-side).
  # Also omit the two scan-config keys themselves, otherwise the scanner flags
  # their own values where they appear in this file.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON_KEY,VITE_SUPABASE_PROJECT_ID,VITE_SUPABASE_ANON_KEY,SECRETS_SCAN_OMIT_KEYS,SECRETS_SCAN_OMIT_PATHS"
  
  # Also ignore the supabase temp directory in secrets scan
  SECRETS_SCAN_OMIT_PATHS = "supabase/.temp"

# SPA redirects - all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
